name: CI Workflow

on:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Force JavaScript actions to use Node.js 24

jobs:
  build-and-push: # job name
    runs-on: ubuntu-latest # Github Runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # clone the code into ubuntu runner

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4 # setup docker buildx

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Build and push
        uses: docker/build-push-action@v7 # build and push the docker image to registry
        with:
          context: ./backend # path to the Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse:latest # tag for the docker image